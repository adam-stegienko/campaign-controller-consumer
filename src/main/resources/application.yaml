spring:
  application:
    name: campaign_controller_consumer
  jpa:
    hibernate:
      ddl-auto: update
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VHOST:/}

google-ads-api:
  base-url: ${GOOGLE_ADS_API_BASE_URL:http://localhost:8081}
  customer-id: ${GOOGLE_ADS_API_CUSTOMER_ID:}

rabbitmq:
  exchange: ${RABBITMQ_EXCHANGE:campaign.controller.exchange}
  queue: ${RABBITMQ_QUEUE:campaign.execution.queue}
  routing-key: ${RABBITMQ_ROUTING_KEY:campaign.execute}
  dlx: ${RABBITMQ_DLX:campaign.controller.dlx}
  error-queue: ${RABBITMQ_ERROR_QUEUE:campaign.execution.error.queue}
  error-routing-key: ${RABBITMQ_ERROR_ROUTING_KEY:campaign.execute.error}

server:
  port: 8000
  http2:
    enabled: true

# Actuator configuration for health checks
management:
  endpoints:
    web:
      exposure:
        include: health,info
      base-path: /
  endpoint:
    health:
      show-details: when-authorized
      show-components: always
  health:
    defaults:
      enabled: true
    db:
      enabled: false
    rabbit:
      enabled: false
  tracing:
    enabled: ${MANAGEMENT_TRACING_EXPORTER_OTLP_ENABLED:false}
    sampling:
      probability: 1.0
    exporter:
      otlp:
        enabled: ${MANAGEMENT_TRACING_EXPORTER_OTLP_ENABLED:false}
        endpoint: ${MANAGEMENT_TRACING_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
  otlp:
    enabled: ${MANAGEMENT_OTLP_ENABLED:false}
    endpoint: ${MANAGEMENT_OTLP_ENDPOINT:http://localhost:4317}
    metrics:
      enabled: ${MANAGEMENT_OTLP_METRICS_ENABLED:false}
      endpoint: ${MANAGEMENT_METRICS_OTLP_ENDPOINT:http://localhost:4318/v1/metrics}
